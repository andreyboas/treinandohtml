<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios em HTML | @andreyboass</title>
    <link rel="stylesheet" href="CssIndex.css">
    <link rel="stylesheet" href="Fonts.css">
    <link rel="icon" href="icons/favixon-site-pc-white.png">
</head>
<body>
    <header>
        <h1 id="TitPgIndex">LISTA DE EXERCICIOS EM HTML</h1>
    </header>
    <nav>
        <a href="Exercicios/TagsDeTexto.html">Exer. 01 - Tags #1</a> |
        <a href="Exercicios/exercicio2.html">Exer. - 02</a>
    </nav>
    <section id="Conteudo"></section>
    <footer>
        @andreyboass
    </footer>
    <script>
        document.querySelectorAll('a').forEach(link => {
            link.onclick = function(e) {
                e.preventDefault()
                const conteudo = document.getElementById('Conteudo')
                fetch(link.href)
                    .then(resp => resp.text())
                    .then(html => conteudo.innerHTML = html)
                }
        })
    </script>
</body>
</html>
